<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sortiment — Lou's FoodTruck Planer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');
  :root {
    --bg:#18181B; --surface:#1F1F23; --border:#2E2E35;
    --amber:#F59E0B; --text:#F4F4F5; --muted:#71717A;
    --green:#22C55E; --red:#EF4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; min-height:100vh; padding-bottom:48px; }

  header {
    display:flex; align-items:center; gap:16px;
    padding:20px 24px; border-bottom:1px solid var(--border);
  }
  .back { color:var(--amber); cursor:pointer; font-size:20px; }
  .header-title { font-size:17px; font-weight:600; }
  .header-sub { font-size:12px; color:var(--muted); }

  main { padding:24px; max-width:640px; margin:0 auto; }

  .add-card {
    background:var(--surface); border:1px solid var(--amber)44; border-radius:14px;
    padding:20px; margin-bottom:28px;
  }
  .add-card h2 { font-size:15px; font-weight:600; margin-bottom:16px; }

  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
  .field { margin-bottom:10px; }
  label { display:block; font-size:11px; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.06em; }
  input, select {
    width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px;
    padding:10px 12px; color:var(--text); font-family:'Space Grotesk',sans-serif;
    font-size:13px; outline:none; -webkit-appearance:none;
  }
  input:focus, select:focus { border-color:var(--amber); }

  .btn-add {
    background:var(--amber); color:#18181B; border:none; border-radius:8px;
    padding:10px 20px; font-family:'Space Grotesk',sans-serif; font-size:13px;
    font-weight:700; cursor:pointer; width:100%; margin-top:8px;
  }

  .section-title {
    font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--muted); margin-bottom:12px; padding-bottom:8px;
    border-bottom:1px solid var(--border);
  }

  .konzept-filter {
    display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;
  }
  .filter-pill {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:6px 14px; font-size:12px; cursor:pointer; transition:all 0.15s;
  }
  .filter-pill.active { background:var(--amber)22; border-color:var(--amber); color:var(--amber); }

  .produkt-list { }
  .produkt-item {
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between;
  }
  .produkt-item.inaktiv { opacity:0.4; }
  .pi-info h3 { font-size:14px; font-weight:500; }
  .pi-meta { font-size:11px; color:var(--muted); margin-top:2px; display:flex; gap:8px; align-items:center; }
  .konzept-badge {
    display:inline-block; background:var(--amber)22; border:1px solid var(--amber)44;
    color:var(--amber); font-size:10px; font-weight:600; border-radius:4px;
    padding:1px 5px; letter-spacing:0.04em;
  }
  .pi-actions { display:flex; gap:8px; }
  .pi-btn {
    background:var(--bg); border:1px solid var(--border); border-radius:6px;
    padding:6px 10px; font-size:11px; cursor:pointer; color:var(--muted);
    font-family:'Space Grotesk',sans-serif; transition:all 0.15s;
  }
  .pi-btn:hover { border-color:var(--amber); color:var(--amber); }
  .pi-btn.del:hover { border-color:var(--red); color:var(--red); }

  .empty { font-size:13px; color:var(--muted); text-align:center; padding:32px; }

  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--green); color:#fff; padding:12px 24px; border-radius:10px;
    font-weight:600; font-size:14px; transition:transform 0.3s; z-index:999;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <span class="back" onclick="window.location.href='dashboard.html'">←</span>
  <div>
    <div class="header-title">Sortiment</div>
    <div class="header-sub">Produkte verwalten</div>
  </div>
</header>

<main>
  <div class="add-card">
    <h2>+ Neues Produkt</h2>
    <div class="field-row">
      <div class="field">
        <label>Produktname</label>
        <input type="text" id="new-name" placeholder="z.B. Spinat-Maultasche">
      </div>
      <div class="field">
        <label>Konzept</label>
        <select id="new-konzept">
          <option value="Maultasche">🥟 Maultasche</option>
          <option value="Burger">🍔 Continental Burger</option>
          <option value="Asia">🥢 Woking Lou</option>
          <option value="Taco">🌮 Taco Loco</option>
          <option value="Standard">Alle</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Kategorie</label>
        <select id="new-kat">
          <option value="Hauptgericht">Hauptgericht</option>
          <option value="Beilage">Beilage</option>
          <option value="Dessert">Dessert</option>
          <option value="Getränk">Getränk</option>
          <option value="Snack">Snack</option>
        </select>
      </div>
      <div class="field">
        <label>Einheit</label>
        <select id="new-einheit">
          <option value="Portion">Portion</option>
          <option value="Stück">Stück</option>
          <option value="Teller">Teller</option>
          <option value="Bowl">Bowl</option>
        </select>
      </div>
    </div>
    <button class="btn-add" onclick="addProdukt()">Produkt hinzufügen</button>
  </div>

  <div class="section-title">Alle Produkte</div>

  <div class="konzept-filter">
    <div class="filter-pill active" onclick="filterKonzept('',this)">Alle</div>
    <div class="filter-pill" onclick="filterKonzept('Maultasche',this)">🥟 Maultasche</div>
    <div class="filter-pill" onclick="filterKonzept('Burger',this)">🍔 Burger</div>
    <div class="filter-pill" onclick="filterKonzept('Asia',this)">🥢 Asia</div>
    <div class="filter-pill" onclick="filterKonzept('Taco',this)">🌮 Taco</div>
  </div>

  <div class="produkt-list" id="produkt-list">
    <div class="empty">Produkte werden geladen…</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://ysqzdqazcgyuzdorauiq.supabase.co';
var SUPABASE_KEY = 'YOUR_ANON_KEY';
var BETREIBER_ID = sessionStorage.getItem('ft_betreiber_id');
var allProdukte = [];
var activeFilter = '';

function headers(extra) {
  var h = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };
  if (extra) Object.assign(h, extra);
  return h;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function filterKonzept(val, el) {
  activeFilter = val;
  document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  renderList();
}

function renderList() {
  var filtered = activeFilter ? allProdukte.filter(function(p) { return p.konzept === activeFilter; }) : allProdukte;
  if (!filtered.length) {
    document.getElementById('produkt-list').innerHTML = '<div class="empty">Keine Produkte.</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(p) {
    html += '<div class="produkt-item' + (p.aktiv ? '' : ' inaktiv') + '" data-id="' + p.id + '">' +
      '<div class="pi-info"><h3>' + p.name + '</h3>' +
      '<div class="pi-meta">' +
      '<span>' + (p.kategorie||'') + '</span>' +
      '<span>·</span><span>' + (p.einheit||'Stück') + '</span>' +
      (p.konzept ? '<span class="konzept-badge">' + p.konzept + '</span>' : '') +
      '</div></div>' +
      '<div class="pi-actions">' +
      '<button class="pi-btn" onclick="toggleAktiv(\'' + p.id + '\',' + p.aktiv + ')">' + (p.aktiv ? 'Deaktivieren' : 'Aktivieren') + '</button>' +
      '<button class="pi-btn del" onclick="loescheProdukt(\'' + p.id + '\')">✕</button>' +
      '</div></div>';
  });
  document.getElementById('produkt-list').innerHTML = html;
}

function loadProdukte() {
  fetch(SUPABASE_URL + '/rest/v1/ft_sortiment?betreiber_id=eq.' + BETREIBER_ID + '&select=id,name,kategorie,konzept,einheit,aktiv&order=konzept,name', {
    headers: headers()
  }).then(function(r) { return r.json(); }).then(function(data) {
    allProdukte = data;
    renderList();
  });
}

function addProdukt() {
  var name = document.getElementById('new-name').value.trim();
  if (!name) { alert('Bitte Produktname eingeben.'); return; }

  fetch(SUPABASE_URL + '/rest/v1/ft_sortiment', {
    method: 'POST',
    headers: headers({'Prefer':'return=representation'}),
    body: JSON.stringify({
      betreiber_id: BETREIBER_ID,
      name: name,
      konzept: document.getElementById('new-konzept').value,
      kategorie: document.getElementById('new-kat').value,
      einheit: document.getElementById('new-einheit').value,
      aktiv: true
    })
  }).then(function(r) { return r.json(); }).then(function(data) {
    allProdukte.push(data[0]);
    renderList();
    document.getElementById('new-name').value = '';
    showToast('✓ ' + name + ' hinzugefügt');
  });
}

function toggleAktiv(id, current) {
  fetch(SUPABASE_URL + '/rest/v1/ft_sortiment?id=eq.' + id, {
    method: 'PATCH',
    headers: headers(),
    body: JSON.stringify({ aktiv: !current })
  }).then(function() {
    var p = allProdukte.find(function(x) { return x.id === id; });
    if (p) p.aktiv = !current;
    renderList();
    showToast(!current ? '✓ Aktiviert' : 'Deaktiviert');
  });
}

function loescheProdukt(id) {
  if (!confirm('Produkt wirklich löschen?')) return;
  fetch(SUPABASE_URL + '/rest/v1/ft_sortiment?id=eq.' + id, {
    method: 'DELETE', headers: headers()
  }).then(function() {
    allProdukte = allProdukte.filter(function(p) { return p.id !== id; });
    renderList();
    showToast('Gelöscht');
  });
}

if (!BETREIBER_ID) { window.location.href = 'index.html'; }
else { loadProdukte(); }
</script>
</body>
</html>
