<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodTruck Planer — Lou's Catering</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');

  :root {
    --bg: #18181B;
    --surface: #1F1F23;
    --border: #2E2E35;
    --amber: #F59E0B;
    --amber-dim: #92400E;
    --text: #F4F4F5;
    --muted: #71717A;
    --green: #22C55E;
    --red: #EF4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .logo-mark {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 48px;
    color: var(--amber);
    line-height: 1;
    margin-bottom: 4px;
  }

  .logo-sub {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 48px;
    text-align: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
  }

  .card h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .card p {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    letter-spacing: 0.3em;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  input[type="password"]:focus {
    border-color: var(--amber);
  }

  .btn {
    width: 100%;
    background: var(--amber);
    color: #18181B;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.02em;
  }

  .btn:hover { opacity: 0.9; }

  .error {
    color: var(--red);
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
    display: none;
  }

  .stats-row {
    display: flex;
    gap: 16px;
    margin-top: 40px;
    width: 100%;
    max-width: 400px;
  }

  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 32px;
    color: var(--amber);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<div class="logo-mark">Lou's</div>
<div class="logo-sub">FoodTruck Planer · Operative Zentrale</div>

<div class="card">
  <h1>Guten Tag 👋</h1>
  <p>PIN eingeben um den Tagesplaner zu öffnen.</p>

  <label>Dein PIN</label>
  <input type="password" id="pin" maxlength="4" placeholder="····" autofocus>

  <div onclick="login()" class="btn">Einloggen</div>
  <div class="error" id="error">Falscher PIN — bitte erneut versuchen.</div>
</div>

<div class="stats-row" id="stats" style="display:none">
  <div class="stat">
    <div class="stat-val" id="stat-eintraege">—</div>
    <div class="stat-label">Tage erfasst</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="stat-produkte">—</div>
    <div class="stat-label">Produkte</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="stat-standorte">—</div>
    <div class="stat-label">Standorte</div>
  </div>
</div>

<div class="footer">rc-digital.de · FoodTruck Planer v1.0</div>

<script>
var SUPABASE_URL = 'https://ysqzdqazcgyuzdorauiq.supabase.co';
var SUPABASE_KEY = 'YOUR_ANON_KEY';
var BETREIBER_ID = null;

function login() {
  var pin = document.getElementById('pin').value;
  fetch(SUPABASE_URL + '/rest/v1/ft_betreiber?pin=eq.' + pin + '&select=id,name', {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.length > 0) {
      sessionStorage.setItem('ft_betreiber_id', data[0].id);
      sessionStorage.setItem('ft_betreiber_name', data[0].name);
      loadStats(data[0].id);
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('error').style.display = 'block';
      document.getElementById('pin').value = '';
      document.getElementById('pin').focus();
    }
  });
}

document.getElementById('pin').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});

function loadStats(id) {
  // Tageseintraege
  fetch(SUPABASE_URL + '/rest/v1/ft_tageseintrag?betreiber_id=eq.' + id + '&select=id', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  }).then(function(r) { return r.json(); }).then(function(d) {
    document.getElementById('stat-eintraege').textContent = d.length || '0';
  });
  // Produkte
  fetch(SUPABASE_URL + '/rest/v1/ft_sortiment?betreiber_id=eq.' + id + '&aktiv=eq.true&select=id', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  }).then(function(r) { return r.json(); }).then(function(d) {
    document.getElementById('stat-produkte').textContent = d.length || '0';
  });
  // Standorte
  fetch(SUPABASE_URL + '/rest/v1/ft_standorte?betreiber_id=eq.' + id + '&aktiv=eq.true&select=id', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  }).then(function(r) { return r.json(); }).then(function(d) {
    document.getElementById('stat-standorte').textContent = d.length || '0';
    document.getElementById('stats').style.display = 'flex';
  });
}
</script>
</body>
</html>
